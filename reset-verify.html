<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <meta name="description" content="منصة أيتامنا الوطنية لخدمات ومبادرات ودعم الأيتام والجمعيات المتخصصة في المملكة العربية السعودية." />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="منصة أيتامنا" />
    <meta name="theme-color" content="#213b58" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="أيتامنا" />
    <meta property="og:locale" content="ar_SA" />
    <meta property="og:title" content="إعادة تعيين كلمة المرور — رمز التحقق — أيتامنا" />
    <meta property="og:description" content="منصة أيتامنا الوطنية لخدمات ومبادرات ودعم الأيتام والجمعيات المتخصصة في المملكة العربية السعودية." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="إعادة تعيين كلمة المرور — رمز التحقق — أيتامنا" />
    <meta name="twitter:description" content="منصة أيتامنا الوطنية لخدمات ومبادرات ودعم الأيتام والجمعيات المتخصصة في المملكة العربية السعودية." />
    <title>إعادة تعيين كلمة المرور — رمز التحقق — أيتامنا</title>
  </head>
  <body class="bg-white">
    <main class="flex min-h-screen">
      <!-- ============== اللوحة المتدرجة (يمين في RTL) ============== -->
      <div class="hidden p-3 lg:block lg:w-1/2">
        <div
          class="auth-gradient flex h-full items-center justify-center rounded-3xl"
        >
          <img loading="lazy" decoding="async"
            src="/src/assets/images/logo-w.svg"
            alt="أيتامنا"
            class="w-48 lg:w-56"
          />
        </div>
      </div>

      <!-- ============== نموذج رمز التحقق (يسار في RTL) ============== -->
      <div class="flex w-full items-center justify-center px-6 py-12 lg:w-1/2">
        <div class="w-full max-w-md">
          <!-- شعار للموبايل فقط -->
          <a href="index.html" class="mb-10 block lg:hidden">
            <img loading="lazy" decoding="async"
              src="/src/assets/images/logo.svg"
              alt="أيتامنا"
              class="h-10 w-auto"
            />
          </a>

          <h1 class="heading-3">إعادة تعيين كلمة المرور</h1>
          <p class="paragraph mt-3 text-gray-500">
            أدخل عنوان بريدك الإلكتروني، وسنرسل لك رمز التحقق
          </p>

          <form class="mt-8" action="#">
            <!-- خانات رمز التحقق (مُعبأة) -->
            <div class="grid max-w-[340px] grid-cols-6 gap-2 sm:gap-3">
              <input
                type="text"
                inputmode="numeric"
                maxlength="1"
                value="7"
                class="otp-input aspect-square w-full rounded-xl border border-base-300 bg-base-100 text-center text-lg font-semibold text-brand-navy outline-none transition placeholder:text-gray-300 focus:border-brand-green focus:ring-2 focus:ring-brand-green/20"
              />
              <input
                type="text"
                inputmode="numeric"
                maxlength="1"
                value="8"
                class="otp-input aspect-square w-full rounded-xl border border-brand-green bg-base-100 text-center text-lg font-semibold text-brand-navy outline-none ring-2 ring-brand-green/20 transition placeholder:text-gray-300 focus:border-brand-green focus:ring-2 focus:ring-brand-green/20"
              />
              <input
                type="text"
                inputmode="numeric"
                maxlength="1"
                value="0"
                class="otp-input aspect-square w-full rounded-xl border border-base-300 bg-base-100 text-center text-lg font-semibold text-brand-navy outline-none transition placeholder:text-gray-300 focus:border-brand-green focus:ring-2 focus:ring-brand-green/20"
              />
              <input
                type="text"
                inputmode="numeric"
                maxlength="1"
                value="2"
                class="otp-input aspect-square w-full rounded-xl border border-base-300 bg-base-100 text-center text-lg font-semibold text-brand-navy outline-none transition placeholder:text-gray-300 focus:border-brand-green focus:ring-2 focus:ring-brand-green/20"
              />
              <input
                type="text"
                inputmode="numeric"
                maxlength="1"
                value="6"
                class="otp-input aspect-square w-full rounded-xl border border-base-300 bg-base-100 text-center text-lg font-semibold text-brand-navy outline-none transition placeholder:text-gray-300 focus:border-brand-green focus:ring-2 focus:ring-brand-green/20"
              />
              <input
                type="text"
                inputmode="numeric"
                maxlength="1"
                value="5"
                class="otp-input aspect-square w-full rounded-xl border border-base-300 bg-base-100 text-center text-lg font-semibold text-brand-navy outline-none transition placeholder:text-gray-300 focus:border-brand-green focus:ring-2 focus:ring-brand-green/20"
              />
            </div>

            <!-- إعادة إرسال الرمز (مُفعّل) -->
            <p class="mt-6 text-sm">
              <button
                type="button"
                class="font-medium text-brand-navy underline transition hover:text-brand-green"
              >
                إعادة ارسال رمز التحقق
              </button>
            </p>

            <a
              href="reset-password.html"
              class="gradient-bg-2 mt-6 flex h-12 w-full items-center justify-center rounded-xl font-medium text-white transition hover:opacity-95"
            >
              تعيين كلمة سر جديدة
            </a>
          </form>
        </div>
      </div>
    </main>

    <script defer
      src="https://kit.fontawesome.com/c150b48bd0.js"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
